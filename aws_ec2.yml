plugin: amazon.aws.aws_ec2
regions:
  - ap-south-1
filters:
  instance-state-name: running
hostnames:
  - public-ip-address
  - private-ip-address
  - instance-id
compose:
  ansible_host: public_ip_address
keyed_groups:
  - key: tags.Name
    prefix: tag
    separator: "_"      # single underscore instead of double
