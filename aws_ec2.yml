plugin: amazon.aws.aws_ec2
regions:
  - ap-south-1

filters:
  instance-state-name: running

hostnames:
  - public_ip_address

compose:
  ansible_host: public_ip_address
  ansible_user: ubuntu
  ansible_ssh_private_key_file: /var/lib/jenkins/workspace/victoria-ansible-deploy/sakshi.pem

keyed_groups:
  - key: tags.Name
    prefix: tag_
